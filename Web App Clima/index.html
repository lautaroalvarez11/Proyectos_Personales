<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Clima</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body onload="onLoad()">
    <div id="container">
        <div class="block">
            <div class="information_container">
                <div id="location"></div>
            </div>

            <div class="information_container">
                Fecha:
                <div class="info" id="date"></div>
            </div>
            
            <div class="information_container">
                Información del cielo:
                <div class="info" id="description"></div>
            </div>
        </div>

        <div class="block">
            <div class="information_container">
                Temperatura:
                <div class="info" id="temperature"></div>
                °
            </div>

            <div class="information_container">
                Humedad:
                <div class="info" id="humidity"></div>
            </div>

            <div class="information_container">
                Presión:
                <div class="info" id="pressure"></div>
            </div>
        </div>
    </div>
    <div id="loader" class="loader">Cargando...</div>
    <script src="index.js"></script>
</body>
</html>
